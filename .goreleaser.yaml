version: 2

project_name: ws

before:
  hooks:
    - go mod tidy

builds:
  - id: ws
    main: ./cmd/ws
    binary: ws
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: ws
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto

brews:
  - name: ws
    repository:
      owner: sonla58
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sonla58/ws-cli"
    description: "Fast, git-aware workspace manager for your terminal."
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "ws"
    test: |
      system "#{bin}/ws", "--version"
    caveats: |
      Add the shell integration to your rc file:
        zsh:  eval "$(ws init zsh)"
        bash: eval "$(ws init bash)"
        fish: ws init fish | source
